name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHPUnit & E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        timeout-minutes: 5
        run: npx playwright install --with-deps chromium

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-wp-env-${{ hashFiles('.wp-env.json') }}

      - name: Load Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/docker-images/images.tar

      - name: Start wp-env
        run: npm run env:start

      - name: Wait for WordPress to be ready
        run: |
          timeout 60 bash -c 'until curl -sSf http://localhost:8889 > /dev/null 2>&1; do sleep 2; done' || echo "WordPress may not be fully ready"
          sleep 5

      - name: Save Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          docker save $(docker image ls -q) -o /tmp/docker-images/images.tar

      - name: Debug - Check WordPress status
        run: |
          curl -I http://localhost:8889 || echo "WordPress not responding"
          docker ps
          
      - name: Run PHPUnit
        run: npm run test:php

      - name: Set up E2E environment
        run: npm run env:setup-e2e

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Stop WordPress environment
        if: always()
        run: npm run env:stop

      - name: Upload test videos and traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment PR with test results
        uses: daun/playwright-report-comment@v3
        if: always() && github.event_name == 'pull_request'
        with:
          report-file: test-results/results.json

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
